<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="glass">
            <h1>✨ Task Manager</h1>
            <p>Organize your work beautifully</p>
        </header>

        <main>
            <div class="layout-grid">
                <!-- Sidebar / Form -->
                <aside>
                    <div class="glass form-container" id="task-form-wrapper">
                        <h2>Create New Task</h2>
                        <div id="task-form">
                            <div class="input-group">
                                <label for="task-title">Task Title</label>
                                <input type="text" id="task-title" placeholder="What needs to be done?">
                            </div>
                            
                            <div class="input-group">
                                <label for="task-description">Description</label>
                                <textarea id="task-description" rows="3" placeholder="Add some details..."></textarea>
                            </div>

                            <div class="row-group">
                                <div class="input-group">
                                    <label for="task-due-date">Due Date</label>
                                    <input type="date" id="task-due-date">
                                </div>
                                <div class="input-group">
                                    <label for="task-priority">Priority</label>
                                    <select id="task-priority">
                                        <option value="Low">Low</option>
                                        <option value="Medium" selected>Medium</option>
                                        <option value="High">High</option>
                                    </select>
                                </div>
                            </div>

                            <div class="input-group">
                                <label for="task-category">Category</label>
                                <input type="text" id="task-category" placeholder="e.g. Work, Personal">
                            </div>

                            <button id="task-form-submit" class="btn primary-btn">Add Task</button>
                        </div>
                    </div>
                </aside>

                <!-- Task List -->
                <section>
                    <div class="glass task-board">
                        <h2>Your Tasks</h2>
                        <div id="task-list-container">
                            <!-- Tasks injected via JS -->
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Edit Task Modal -->
    <div id="edit-task-form" class="modal-overlay" style="display: none;">
        <div class="glass modal-content">
            <h2>Edit Task</h2>
            <div class="input-group">
                <label for="edit-task-title">Task Title</label>
                <input type="text" id="edit-task-title">
            </div>
            <div class="input-group">
                <label for="edit-task-description">Description</label>
                <textarea id="edit-task-description" rows="3"></textarea>
            </div>
            <div class="row-group">
                <div class="input-group">
                    <label for="edit-task-due-date">Due Date</label>
                    <input type="date" id="edit-task-due-date">
                </div>
                <div class="input-group">
                    <label for="edit-task-priority">Priority</label>
                    <select id="edit-task-priority">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label for="edit-task-category">Category</label>
                <input type="text" id="edit-task-category">
            </div>
            <div class="modal-actions">
                <button onclick="document.getElementById('edit-task-form').style.display='none'" class="btn secondary-btn">Cancel</button>
                <button id="edit-task-form-submit" class="btn primary-btn">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
