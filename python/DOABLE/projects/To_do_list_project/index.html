<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List App</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div class="todo-app">
    <h1>Todo List</h1>

    <div class="input-section">
      <input id="new-task-input" type="text" placeholder="What needs to be done?" />
      <button id="add-task-btn">Add</button>
    </div>

    <ul id="task-list" class="task-list">
      <!-- Task items will be rendered here dynamically -->
    </ul>

    <div class="filters">
      <button id="filter-all" class="filter-btn">All</button>
      <button id="filter-active" class="filter-btn">Active</button>
      <button id="filter-completed" class="filter-btn">Completed</button>
    </div>
  </div>

  <footer>
    <small>© 2024 Todo List App. Created by Your Name.</small>
  </footer>
</body>
</html>
